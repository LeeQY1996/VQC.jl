name: Documentation

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.6'

      - name: Clone QuantumCircuits dependency
        run: |
          cd ..
          git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/guochu/QuantumCircuits.jl.git

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop(PackageSpec(path="../QuantumCircuits.jl"))
            Pkg.instantiate()
            Pkg.add("Documenter")
          '

      - name: Build and deploy documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_DEBUG: true
          CI: true
        run: julia --project=. docs/make.jl